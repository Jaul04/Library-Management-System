<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LibraryMS | Signup</title>

<link rel="stylesheet" href="si.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<nav class="navbar">

    <div class="logo">
        <i class="fa-solid fa-book-open"></i>
        LibraryMS
    </div>

    <ul class="nav-links">

        <li>Home</li>

        <li>Books</li>

        <li>Student</li>

        <li>Contact</li>

    </ul>

</nav>

<section class="hero">

    <div class="hero-content">

        <h1>Create <span>Account</span></h1>

        <p>
            Register yourself to access the Library Management System.
        </p>

    </div>

</section>

<section class="signup-section">

<div class="signup-card">

<div class="left">

<i class="fa-solid fa-user-plus signup-icon"></i>

<h2>Join LibraryMS</h2>

<p>

Create your account and manage books,
students, issued books and returns easily.

</p>

</div>

<div class="right">

<h2>Sign Up</h2>

<form id="signupForm">

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
name="username"
placeholder="Full Name"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
name="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
name="password"
placeholder="Password"
required>

<span id="togglePassword">

<i class="fa-solid fa-eye"></i>

</span>

</div>

<button class="btn">

<i class="fa-solid fa-user-plus"></i>

Create Account

</button>

<div class="extra">

Already have an account?

<a href="/login">

Login

</a>

</div>

</form>

</div>

</div>

</section>

<script>

const password = document.getElementById("password");

const toggle = document.getElementById("togglePassword");

toggle.onclick = function(){

    if(password.type === "password"){

        password.type = "text";

        toggle.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';

    }else{

        password.type = "password";

        toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';

    }

};


document.getElementById("signupForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(this);

    const username = formData.get("username");

    const email = formData.get("email");

    const password = formData.get("password");

   const response = await fetch("/api/signup", {

        method:"POST",

        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },

        body:new URLSearchParams({
            username,
            email,
            password
        })

    });

    const result = await response.text();

    alert(result);

    if(result.includes("Signup successful")){

        window.location.href="/login";

    }

});

</script>

</body>

</html>
